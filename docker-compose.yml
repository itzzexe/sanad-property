services:
  postgres:
    image: postgres:16-alpine
    container_name: rentflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rentflow}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rentflow-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rentflow']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rentflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - rentflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentflow-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rentflow}:${POSTGRES_PASSWORD:-rentflow_secret}@postgres:5432/${POSTGRES_DB:-rentflow}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-rentflow}
      NODE_ENV: production
      PORT: 4000
    # ports: - '4000:4000' # Removed for security: Only accessible through NGINX
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - rentflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentflow-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - rentflow-network

  nginx:
    image: nginx:alpine
    container_name: rentflow-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rentflow-network

volumes:
  postgres_data:
  minio_data:

networks:
  rentflow-network:
    driver: bridge
